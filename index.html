<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全国地震観測モニター Web版</title>
    <style>
        :root {
            --bg-main: #050A0F;
            --bg-side: #0A1018;
            --bg-cell: #101D29;
            --border-cell: #1A2634;
            --text-normal: #A0B0C0;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-main);
            color: #FFFFFF;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            display: flex;
            flex-direction: row;
            height: 100vh;
            overflow: hidden;
        }

        /* メインコンテナ */
        #main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
            overflow-y: auto;
        }

        /* ヘッダーエリア */
        #header {
            min-height: 180px;
            display: flex;
            justify-content: space-between;
            border-bottom: 2px solid var(--border-cell);
            margin-bottom: 15px;
            flex-shrink: 0; /* ヘッダーの高さが潰れるのを防ぐ */
        }

        #epicenter-box {
            flex: 1;
        }

        #history-warning {
            color: #FF0000;
            font-weight: bold;
            font-size: 1.2rem;
            margin: 0;
        }

        #location-label {
            color: #00FF00;
            font-size: 0.9rem;
            margin: 5px 0;
        }

        #epicenter-name {
            font-size: 3.5rem; /* サイズ固定 */
            font-weight: bold;
            margin: 5px 0;
            color: #FFFFFF;
            line-height: 1.1;
        }

        #info-detail {
            color: var(--text-normal);
            font-size: 1.1rem;
            margin: 5px 0;
            line-height: 1.4;
        }

        #arrival-timer {
            color: #FFFF00;
            font-size: 1.8rem;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            margin-top: 5px;
        }

        /* 市町村別詳細ボタン */
        #detail-nav-btn {
            display: none;
            background-color: #FFD700;
            color: #000000;
            font-weight: bold;
            border: none;
            padding: 8px 15px;
            font-size: 1.1rem;
            margin-top: 8px;
            cursor: pointer;
            border-radius: 4px;
        }

        #detail-nav-btn:hover {
            background-color: #FFC400;
        }

        /* ボタン類 */
        #btn-group {
            display: flex;
            gap: 10px;
            align-items: flex-start;
            flex-wrap: wrap;
        }

        button.ui-btn {
            background-color: #1A2634;
            color: #FFFFFF;
            border: 1px solid var(--border-cell);
            padding: 8px 15px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 0.9rem;
        }

        button.ui-btn:hover {
            background-color: #223344;
        }

        /* グリッドレイアウト（PCは10列） */
        #grid-container {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 5px;
            margin-bottom: 20px;
        }

        /* 47都道府県のマス目（サイズと文字サイズを完全固定） */
        .pref-cell {
            background-color: var(--bg-cell);
            border: 1px solid var(--border-cell);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 5px;
            box-sizing: border-box;
            position: relative;
            height: 85px; /* 縦幅を完全に固定 */
            min-height: 85px;
            overflow: hidden; /* 文字がはみ出しても枠を広げない */
        }

        .pref-name {
            font-size: 12px; /* 固定値 */
            color: var(--text-normal);
            white-space: nowrap;
        }

        .hypo-label {
            font-size: 11px; /* 固定値 */
            color: #FF00FF;
            font-weight: bold;
            display: none;
            white-space: nowrap;
        }

        .pref-intensity {
            font-size: 32px; /* 固定値。文字が大きくても枠を押し広げない */
            font-family: 'Courier New', monospace;
            font-weight: bold;
            line-height: 1;
        }

        /* サイドバー */
        #sidebar {
            width: 380px;
            background-color: var(--bg-side);
            display: flex;
            flex-direction: column;
            border-left: 2px solid var(--border-cell);
            box-sizing: border-box;
            flex-shrink: 0;
        }

        #clock-box {
            background-color: #161B22;
            padding: 15px;
            text-align: center;
        }

        #date-label {
            color: var(--text-normal);
            font-family: 'Courier New', monospace;
            font-size: 1.1rem;
            margin: 0;
        }

        #clock-label {
            color: #00F2FF;
            font-family: 'Courier New', monospace;
            font-size: 2.2rem;
            font-weight: bold;
            margin: 5px 0 0 0;
        }

        #history-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            font-size: 0.9rem;
        }

        .history-item {
            border-bottom: 1px dashed var(--border-cell);
            padding: 10px 5px;
            cursor: pointer;
            line-height: 1.4;
        }

        .history-item:hover {
            background-color: #121B26;
        }

        /* スマホ・タブレット用（画面が狭いときの設定） */
        @media (max-width: 900px) {
            body {
                flex-direction: column;
                overflow-y: auto;
                height: auto;
            }
            #sidebar {
                width: 100% !important;
                border-left: none !important;
                border-top: 2px solid var(--border-cell);
                height: 400px;
            }
            #header {
                min-height: auto !important;
                height: auto !important;
                flex-direction: column;
            }
            #epicenter-name {
                font-size: 2.5rem; /* スマホ用固定値 */
            }
            #btn-group {
                margin-top: 15px;
                margin-bottom: 10px;
            }
            #grid-container {
                grid-template-columns: repeat(2, 1fr) !important; /* スマホなら横に2列均等に並べる */
                grid-template-rows: auto !important;
            }
            .pref-cell {
                height: 75px !important; /* スマホ用縦幅固定値 */
                min-height: 75px !important;
            }
            .pref-intensity {
                font-size: 28px; /* スマホ用固定値 */
            }
        }

        /* 市町村詳細レイヤー */
        #detail-layer {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-main);
            z-index: 100;
            flex-direction: column;
            box-sizing: border-box;
        }

        #detail-nav {
            background-color: #1A2634;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        #pref-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-y: auto;
        }

        #pref-sel-frame {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
            gap: 10px;
            width: 100%;
            max-width: 900px;
        }

        button.pref-btn {
            padding: 10px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        #city-scroll {
            display: none;
            flex: 1;
            padding: 20px 40px;
            overflow-y: auto;
            font-size: 1.2rem;
            white-space: pre-wrap;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div id="main-container">
        <div id="header">
            <div id="epicenter-box">
                <p id="history-warning"></p>
                <div id="location-label">📍 監視地点: 取得中...</div>
                <h1 id="epicenter-name">データ受信待機...</h1>
                <p id="info-detail"></p>
                <button id="detail-nav-btn" onclick="showPrefSelector()">市町村別詳細を表示 ≫</button>
                <div id="arrival-timer"></div>
            </div>
            <div id="btn-group">
                <button class="ui-btn" onclick="reDisplayLastEew()" style="color: #00FF00; font-weight: bold;">再表示</button>
                <button class="ui-btn" onclick="resetUI()">表示クリア</button>
                <button class="ui-btn" onclick="setZipCode()" style="color: #00F2FF;">地点設定(郵便番号)</button>
            </div>
        </div>

        <div id="grid-container">
            </div>
    </div>

    <div id="sidebar">
        <div id="clock-box">
            <p id="date-label">----/--/--</p>
            <p id="clock-label">--:--:--</p>
        </div>
        <div id="history-list">
            履歴情報を読み込み中...
        </div>
    </div>

    <div id="detail-layer">
        <div id="detail-nav">
            <button onclick="hideDetailLayer()" style="background-color: #445566; color: white; border:none; padding: 10px 20px; font-weight:bold; cursor:pointer; font-size:1rem;">≪ 戻る</button>
            <span style="color: #00F2FF; font-size: 1.4rem; font-weight: bold;">各都道府県 市町村別震度一覧</span>
        </div>
        <div id="pref-container">
            <div id="pref-sel-frame"></div>
        </div>
        <div id="city-scroll"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
